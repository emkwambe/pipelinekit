name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12", "3.13"]
        exclude:
          # Reduce matrix — only test 3.11 and 3.13 on Mac/Windows
          # Ubuntu gets the full matrix as the primary platform
          - os: macos-latest
            python-version: "3.12"
          - os: windows-latest
            python-version: "3.12"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Poetry
        run: pip install poetry

      - name: Install dependencies
        run: poetry install --no-interaction

      - name: Lint (ruff)
        run: poetry run ruff check src/pipelinekit

      - name: Format check (black)
        run: poetry run black --check .

      - name: Type check (mypy)
        run: poetry run mypy src/pipelinekit

      - name: Test
        run: poetry run pytest tests/ -q --cov=src/pipelinekit --cov-report=term-missing --cov-fail-under=75
