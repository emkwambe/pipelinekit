name: Render Diagrams

# Build a static docs/diagrams/index.html that renders every Mermaid diagram
# client-side via the Mermaid CDN. This avoids Chromium/puppeteer entirely:
# CI only generates a text file, and rendering happens in the viewer's browser.
#
# The committed index.html does NOT re-trigger this workflow: the path filter
# only matches *.mmd, and pushes made with GITHUB_TOKEN do not start new runs.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'docs/diagrams/*.mmd'

permissions:
  contents: write

jobs:
  build-index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build diagrams index.html
        run: python3 .github/scripts/build_diagram_index.py

      - name: Commit index.html
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/diagrams/index.html
          if git diff --staged --quiet; then
            echo "No index changes to commit."
          else
            git commit -m "ci: build diagrams index.html"
            git push
          fi
