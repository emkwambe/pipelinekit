# pipelinekit.example.yaml
# Copy to your project root as pipelinekit.yaml and fill in your credentials

pipeline:
  name: postgres-to-snowflake-blueprint-001
  version: "1.0.0"
  description: "Blueprint #001 — Postgres to Snowflake trusted analytics"

runtime:
  environment: local

# Credentials are read from environment variables via ${VAR} interpolation
# (ADR-017). Set the referenced vars before running. See runbook.md Prerequisites.
ingestion:
  source:
    type: postgres
    host: "${PG_HOST}"
    port: 5432
    database: "${PG_DATABASE}"
    user: "${PG_USER}"
    password: "${PG_PASSWORD}"
    tables:
      - orders
  destination:
    type: snowflake
    account: "${SNOWFLAKE_ACCOUNT}"
    database: "${SNOWFLAKE_DATABASE}"
    user: "${SNOWFLAKE_USER}"
    password: "${SNOWFLAKE_PASSWORD}"
    warehouse: "${SNOWFLAKE_WAREHOUSE}"
    schema: "raw"

transformation:
  enabled: true
  project_dir: ./transform

contracts:
  enabled: true
  directory: ./contracts

quality:
  enabled: true
  checks_dir: ./quality

diagnostics:
  enabled: true
  provider: anthropic

notifications:
  enabled: false
  channels: []
