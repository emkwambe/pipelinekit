version: 2

sources:
  - name: postgres_raw
    description: >
      Raw operational data ingested from the source Postgres database
      via the dlt pipeline. Tables land in the raw schema before
      staging models transform them.
    # Env-driven so the same source works for DuckDB (local) and Snowflake
    # (production). Defaults preserve production behavior when the DBT_SOURCE_*
    # overrides are unset.
    database: "{{ env_var('DBT_SOURCE_DATABASE', env_var('SNOWFLAKE_DATABASE', '')) }}"
    schema: "{{ env_var('DBT_SOURCE_SCHEMA', 'pipelinekit_pipeline_raw') }}"
    tables:
      - name: orders
        description: Raw orders table ingested from Postgres source.
        columns:
          - name: order_id
            description: Primary key. Unique order identifier.
            tests:
              - unique
              - not_null
          - name: customer_id
            description: Foreign key to the customers table.
            tests:
              - not_null
          - name: status
            description: Order fulfillment status.
            tests:
              - not_null
              - accepted_values:
                  arguments:
                    values: ['pending', 'processing', 'shipped', 'delivered', 'cancelled', 'confirmed']
          - name: amount
            description: Order total in the source currency.
            tests:
              - not_null
          - name: created_at
            description: Timestamp when the order was created in the source system.
            tests:
              - not_null