    "id": "01_system_overview",
    "title": "01-system-overview",
    "code": "%% PipelineKit \u2014 System Overview (Investor / Executive)\n%% Audience: investors, executives, first-time evaluators.\n%% High-level value picture. Note: \"Health\" is a deterministic operations\n%% capability (not AI); the other four are AI-assisted.\n%% Layout: top row reads left-to-right (Stack -> Capabilities -> Providers),\n%% then drops down to Blueprint Sources and the trust-model phrase.\n%% The trust node receives only from Capabilities and Blueprint Sources.\nflowchart TB\n    subgraph row1[\" \"]\n        direction LR\n        subgraph stack[\"The Analytics Stack\"]\n            direction LR\n            data[\"RealityDB<br/>data\"] --> pk[\"PipelineKit<br/>pipeline OS\"] --> out[\"Analytics<br/>trusted output\"]\n        end\n        subgraph caps[\"Five Capabilities\"]\n            direction LR\n            diag[\"Diagnose\"]\n            arch[\"Architect\"]\n            prop[\"Propose\"]\n            mig[\"Migrate\"]\n            hlth[\"Health\"]\n        end\n        subgraph prov[\"AI Providers (BYOK)\"]\n            direction LR\n            anth[\"Anthropic<br/>US\"]\n            oai[\"OpenAI<br/>US\"]\n            oll[\"Ollama<br/>local\"]\n            ds[\"DeepSeek<br/>China\"]\n            mis[\"Mistral<br/>EU\"]\n        end\n        stack --> caps --> prov\n    end\n\n    subgraph bp[\"Blueprint Sources\"]\n        direction LR\n        hand[\"Hand-crafted\"]\n        aip[\"AI-proposed\"]\n        reg[\"Registry-installed\"]\n    end\n\n    trust[\"AI Proposes \u2192 Human Approves \u2192 Apply Writes\"]\n\n    caps --> bp\n    caps --> trust\n    bp --> trust\n\n    classDef phrase fill:#0a7d55,color:#ffffff,font-weight:bold,stroke:#064;\n    class trust phrase;\n"
  },
  {
    "id": "02_five_layer_architecture",
    "title": "02-five-layer-architecture",
    "code": "%% PipelineKit \u2014 Five-Layer Architecture (Engineering)\n%% Audience: engineers evaluating PipelineKit, contributors.\n%% Components verified against src/pipelinekit/.\nflowchart TB\n    subgraph L5[\"Layer 5 \u2014 Architecture Intelligence\"]\n        direction LR\n        ae[\"ArchitectureEngine\"]\n        adrr[\"ADR reader / arch evidence\"]\n    end\n\n    subgraph L4[\"Layer 4 \u2014 Intelligence Layer\"]\n        direction LR\n        de[\"DiagnosticsEngine\"]\n        ec[\"EvidenceCollector\"]\n        bpprop[\"BlueprintProposer\"]\n        manalyzer[\"MigrationAnalyzer\"]\n        llm[\"LLMProvider (protocol)\"]\n    end\n\n    subgraph L3[\"Layer 3 \u2014 Trust Layer\"]\n        direction LR\n        breg[\"BlueprintRegistry\"]\n        rreg[\"RemoteRegistry\"]\n        cval[\"ContractValidator\"]\n        ndisp[\"NotificationDispatcher\"]\n    end\n\n    subgraph L2[\"Layer 2 \u2014 Data Layer\"]\n        direction LR\n        runner[\"PipelineRunner\"]\n        dlt[\"dlt adapter (ingestion)\"]\n        dbt[\"dbt adapter (transformation)\"]\n        soda[\"Soda adapter (quality)\"]\n    end\n\n    subgraph L1[\"Layer 1 \u2014 Foundation\"]\n        direction LR\n        cli[\"CLI (Typer)\"]\n        cfg[\"PipelineConfig\"]\n        errs[\"Error hierarchy (PK-*)\"]\n    end\n\n    L5 --> L4 --> L3 --> L2 --> L1\n\n    state[\"State store<br/>SQLite \u2014 .pipelinekit/state.db\"]\n    L1 -.-> state\n    L2 -.-> state\n    L3 -.-> state\n    L4 -.-> state\n    L5 -.-> state\n\n    chain[\"Document chain<br/>Constitution to ADR to SPEC to Code\"]\n    chain -.->|governs| L1\n    chain -.->|governs| L5\n\n    classDef cross fill:#234,color:#fff,stroke:#9bf;\n    class state,chain cross;\n"
  },
  {
    "id": "03_cli_command_map",
    "title": "03-cli-command-map",
    "code": "%% PipelineKit \u2014 CLI Command Map (Engineering / Maintenance)\n%% Audience: engineers, maintainers, on-call.\n%% Commands and flags verified against src/pipelinekit/cli/main.py and each command module.\n%% Dotted edges show state.db tables read/written and external systems called.\nflowchart LR\n    root([\"pipelinekit\"])\n\n    %% --- Core ---\n    root --> init[\"init\"]\n    root --> validate[\"validate [--contracts]\"]\n    root --> run[\"run [--dry-run]\"]\n    root --> status[\"status\"]\n\n    %% --- blueprint group ---\n    root --> bp[\"blueprint\"]\n    bp --> bp_list[\"list\"]\n    bp --> bp_val[\"validate [name]\"]\n    bp --> bp_info[\"info &lt;name&gt;\"]\n    bp --> bp_search[\"search &lt;query&gt; [--verified]\"]\n    bp --> bp_install[\"install &lt;name&gt; [--version] [--force]\"]\n\n    %% --- generate group ---\n    root --> gen[\"generate\"]\n    gen --> gen_bp[\"blueprint -s -d -t [--plan|--interactive] [-p] [-n]\"]\n    gen --> gen_show[\"show &lt;plan-id&gt;\"]\n\n    %% --- apply group ---\n    root --> apply[\"apply\"]\n    apply --> apply_plan[\"plan &lt;plan-id&gt; [--interactive]\"]\n\n    %% --- diagnose ---\n    root --> diag[\"diagnose [run-id] [--provider] [--approve]\"]\n\n    %% --- architect group ---\n    root --> arch[\"architect\"]\n    arch --> arch_an[\"analyze [question] [--type] [--provider] [--approve]\"]\n    arch --> arch_adr[\"check-adrs &lt;change&gt; [--provider]\"]\n    arch --> arch_cmp[\"compare &lt;tool-a&gt; &lt;tool-b&gt; [--provider]\"]\n\n    %% --- health group ---\n    root --> health[\"health [--strict]\"]\n    health --> h_deps[\"deps\"]\n    health --> h_sec[\"security\"]\n    health --> h_bp[\"blueprints\"]\n    health --> h_specs[\"specs [--fix]\"]\n    health --> h_tests[\"tests\"]\n\n    %% --- migrate group ---\n    root --> mig[\"migrate\"]\n    mig --> mig_an[\"analyze &lt;config&gt; [--provider] [--apply] [--write-draft]\"]\n\n    %% --- state.db tables ---\n    subgraph SDB[\"state.db (8 tables)\"]\n        t_runs[\"pipeline_runs\"]\n        t_contract[\"contract_results\"]\n        t_diag[\"diagnostic_results\"]\n        t_arch[\"architecture_results\"]\n        t_health[\"health_runs\"]\n        t_prop[\"blueprint_proposals\"]\n        t_inst[\"installed_blueprints\"]\n    end\n\n    %% --- external systems ---\n    subgraph EXT[\"External systems\"]\n        ext_data[\"dlt / dbt / Soda\"]\n        ext_llm[\"AI provider API\"]\n        ext_reg[\"Remote registry\"]\n        ext_fs[\"filesystem (pipelinekit.yaml / blueprints/)\"]\n    end\n\n    %% state + external interactions (verified)\n    init -.->|writes| ext_fs\n    validate -.->|reads| ext_fs\n    run -.->|\"writes pending+final\"| t_runs\n    run -.->|executes| ext_data\n    status -.->|reads| t_runs\n    bp_install -.->|writes| t_inst\n    bp_search -.->|calls| ext_reg\n    bp_install -.->|calls| ext_reg\n    gen_bp -.->|writes| t_prop\n    gen_bp -.->|calls| ext_llm\n    gen_show -.->|reads| t_prop\n    apply_plan -.->|\"reads/updates\"| t_prop\n    apply_plan -.->|writes| ext_fs\n    diag -.->|\"reads runs / writes\"| t_diag\n    diag -.->|calls| ext_llm\n    arch_an -.->|writes| t_arch\n    arch_an -.->|calls| ext_llm\n    health -.->|writes| t_health\n    mig_an -.->|calls| ext_llm\n    mig_an -.->|\"writes pipelinekit.proposed.yaml\"| ext_fs\n"
  },
  {
    "id": "04_pipeline_execution_flow",
    "title": "04-pipeline-execution-flow",
    "code": "%% PipelineKit \u2014 Pipeline Execution Flow (Engineering / Debugging)\n%% Audience: engineers debugging pipelinekit run.\n%% Sequence verified against src/pipelinekit/runtime/runner.py (run()).\n%% The run record is updated in a try/finally \u2014 it is NEVER skipped, even on failure.\nsequenceDiagram\n    actor User\n    participant CLI as CLI (run.py)\n    participant Loader as config.loader\n    participant Runner as PipelineRunner\n    participant State as state.db\n    participant Adapters as Adapters (dlt / dbt / Soda)\n    participant Notifier as NotificationDispatcher\n\n    User->>CLI: pipelinekit run\n    CLI->>Loader: load_config()\n    alt config invalid\n        Loader-->>CLI: ConfigurationError (PK-CONFIG-001..004)\n        CLI-->>User: print error, exit 1\n    end\n    Loader-->>CLI: PipelineConfig\n    CLI->>Runner: run()\n    Runner->>State: insert_run(run_id, status=pending)\n\n    Note over Runner,Adapters: Enabled steps only, in order: ingestion, transformation, quality\n\n    loop each enabled adapter\n        Runner->>Adapters: execute_step(name, adapter)\n        alt step succeeds\n            Adapters-->>Runner: StepResult(SUCCESS, rows, duration)\n        else step fails\n            Adapters-->>Runner: StepResult(FAILED, error_code e.g. PK-ADAPTER-001/002)\n        end\n    end\n\n    Note over Runner: aggregate status (SUCCESS / PARTIAL / FAILED).<br/>Unexpected exception, error_code = PK-RUNTIME-001\n\n    Runner->>State: update_run(final status, duration, error_code) [try/finally]\n\n    opt notifications.enabled\n        Runner->>Notifier: notify_pipeline_result(result)\n        Note over Notifier: failure swallowed \u2014 never corrupts state (SPEC-008)\n    end\n\n    Runner-->>CLI: PipelineResult (per-step status, duration, rows)\n    CLI-->>User: render run table, exit 0 if succeeded else 1\n\n    Note over CLI,State: Data contract DEFINITIONS are checked by<br/>pipelinekit validate --contracts (PK-CONTRACT-*);<br/>data-quality checks run in the Soda step above.\n"
  },
  {
    "id": "05_blueprint_proposal_flow",
    "title": "05-blueprint-proposal-flow",
    "code": "%% PipelineKit \u2014 AI Blueprint Proposal Flow (Engineering / Product)\n%% Audience: engineers, PMs, design partners.\n%% Verified against ai/blueprint_proposer.py, ai/proposal_models.py, cli/generate.py.\n%% Trust boundary: AI proposes, human approves, apply() writes. can_auto_apply always False.\nflowchart TB\n    start[\"pipelinekit generate blueprint<br/>-s stripe -d snowflake -t charges --plan\"]\n    start --> capcheck{\"AdapterCapabilityRegistry<br/>is_source/destination_supported?\"}\n    capcheck -->|no| gen6[\"PK-GEN-006<br/>unsupported connector (before any AI call)\"]\n    capcheck -->|yes| ctx[\"BlueprintProposer._build_context()<br/>existing blueprints + blueprint.schema.json + source fields\"]\n\n    ctx --> call[\"LLMProvider.propose_blueprint(context)<br/>PROPOSAL_SYSTEM_PROMPT to provider API\"]\n    call --> parse[\"parse_proposal_response()<br/>strip fences, extract JSON object\"]\n    parse -->|\"not valid JSON\"| gen1[\"PK-GEN-001\"]\n    parse --> valassets[\"validate blueprint.json asset vs schema<br/>(recorded, not fatal \u2014 PK-GEN-005 surfaced in review)\"]\n    valassets --> prov[\"attach AssetProvenance (9 fields) to each asset\"]\n    prov --> force[\"force can_auto_apply = False\"]\n    force --> valplan[\"validate assembled plan vs schema\"]\n    valplan -->|invalid| gen2[\"PK-GEN-002\"]\n    valplan --> store[\"store in state.db: blueprint_proposals\"]\n    store --> render[\"CLI renders: Plan ID, confidence, assumptions, required decisions<br/>(no files written)\"]\n\n    render --> review[\"pipelinekit generate blueprint --interactive<br/>OR generate show + apply plan\"]\n    review --> loop[\"per-asset review:<br/>[a]ccept [r]eject [e]dit [x]explain [y-all]\"]\n    loop --> applycmd[\"pipelinekit apply plan &lt;id&gt;\"]\n    applycmd --> noappr{\"any APPROVED assets?\"}\n    noappr -->|no| gen3[\"PK-GEN-003\"]\n    noappr -->|\"dir exists\"| gen4[\"PK-GEN-004\"]\n    noappr -->|yes| write[\"write APPROVED assets only<br/>_strip_provenance() before write\"]\n    write --> validatecmd[\"pipelinekit blueprint validate\"]\n\n    %% State machine\n    subgraph SM[\"AssetState machine (invalid transition = PK-GEN-007)\"]\n        direction LR\n        s0[\"proposed\"] --> s1[\"approved\"] --> s2[\"written\"] --> s3[\"validated\"]\n        s0 --> sr[\"rejected\"]\n        s0 --> se[\"edited\"] --> s0\n    end\n\n    loop -.-> s1\n    write -.-> s2\n    validatecmd -.-> s3\n\n    classDef err fill:#7d1a1a,color:#fff,stroke:#c66;\n    class gen1,gen2,gen3,gen4,gen6 err;\n"
  },
  {
    "id": "06_migration_intelligence_flow",
    "title": "06-migration-intelligence-flow",
    "code": "%% PipelineKit \u2014 Migration Intelligence Flow (Engineering / Sales)\n%% Audience: engineers evaluating migration; sales with Airbyte/Fivetran users.\n%% Verified against ai/config_parsers.py, ai/migration_analyzer.py, cli/migrate.py.\n%% Parsing is deterministic; the Python parser uses ast.parse() only \u2014 never exec.\nflowchart TB\n    cfg[\"Existing config<br/>airbyte-connection.json / fivetran-connector.json / pipeline.py\"]\n    cfg --> route{\"MigrationConfigParser.parse()<br/>detect format\"}\n    route -->|\".json (Airbyte)\"| ap[\"AirbyteParser\"]\n    route -->|\".json (Fivetran)\"| fp[\"FivetranParser\"]\n    route -->|\".py\"| pp[\"PythonParser (ast.parse only)\"]\n    route -->|\"not found\"| m1[\"PK-MIGRATE-001\"]\n    route -->|unrecognised| m2[\"PK-MIGRATE-002\"]\n    pp -->|\"syntax error\"| m5[\"PK-MIGRATE-005\"]\n\n    ap --> analyze[\"MigrationAnalyzer.analyze()<br/>build context + available blueprints\"]\n    fp --> analyze\n    pp --> analyze\n    analyze --> call[\"LLMProvider.analyze_migration()\"]\n    call -->|\"invalid JSON\"| m4[\"PK-MIGRATE-004\"]\n    call --> prop[\"MigrationProposal<br/>mappings + gaps + confidence + draft_yaml<br/>can_auto_apply = False\"]\n\n    prop --> render[\"CLI renders mappings and gaps\"]\n    subgraph MAP[\"Mapping status\"]\n        direction LR\n        clean[\"clean \u2014 maps directly\"]\n        partial[\"partial \u2014 maps with adjustment\"]\n        manual[\"manual \u2014 significant human work\"]\n        unsupported[\"unsupported \u2014 no equivalent\"]\n    end\n    render --> MAP\n\n    render --> applycmd[\"pipelinekit migrate analyze --apply\"]\n    applycmd --> gate{\"blocking_gaps > 0 and not --write-draft?\"}\n    gate -->|yes| m3[\"PK-MIGRATE-003<br/>use --write-draft\"]\n    gate -->|\"no / --write-draft\"| draft[\"write pipelinekit.proposed.yaml<br/>(NEVER pipelinekit.yaml)\"]\n    draft --> fill[\"human fills FIXME markers\"]\n    fill --> val[\"pipelinekit validate\"]\n    val --> runp[\"pipelinekit run\"]\n\n    subgraph REPL[\"What each tool's ingestion becomes\"]\n        direction LR\n        air[\"Airbyte to dlt\"]\n        fiv[\"Fivetran to dlt\"]\n        cpy[\"custom Python to dlt\"]\n    end\n\n    classDef err fill:#7d1a1a,color:#fff,stroke:#c66;\n    class m1,m2,m3,m4,m5 err;\n"
  },
  {
    "id": "07_state_store_schema",
    "title": "07-state-store-schema",
    "code": "%% PipelineKit \u2014 State Store Schema (Maintenance / Engineering)\n%% Audience: maintainers, engineers debugging state.\n%% Columns verified EXACTLY against src/pipelinekit/state/db.py (_SCHEMA).\n%% State lives at .pipelinekit/state.db (SQLite). Run-id links are logical\n%% (no enforced FK constraints in the schema). Command->table edges: see Diagram 03.\nerDiagram\n    pipeline_runs {\n        TEXT id PK\n        TEXT pipeline\n        TEXT status\n        TEXT started_at\n        TEXT finished_at\n        REAL duration_s\n        TEXT error_code\n        TEXT error_msg\n    }\n    validation_runs {\n        TEXT id PK\n        TEXT status\n        TEXT ran_at\n        INTEGER error_count\n        TEXT errors\n    }\n    contract_results {\n        TEXT id PK\n        TEXT run_id FK\n        TEXT table_name\n        TEXT status\n        INTEGER violation_count\n        TEXT violations\n        TEXT checked_at\n    }\n    diagnostic_results {\n        TEXT id PK\n        TEXT run_id FK\n        TEXT status\n        TEXT finding_type\n        REAL confidence\n        TEXT explanation\n        TEXT evidence\n        TEXT actions\n        INTEGER can_auto_fix\n        TEXT diagnosed_at\n        TEXT provider\n    }\n    architecture_results {\n        TEXT id PK\n        TEXT reasoning_type\n        TEXT question\n        REAL confidence\n        TEXT recommendation\n        TEXT tradeoffs\n        TEXT adr_compliance\n        INTEGER can_auto_apply\n        TEXT analyzed_at\n        TEXT provider\n    }\n    health_runs {\n        TEXT id PK\n        TEXT ran_at\n        TEXT deps_status\n        TEXT security_status\n        TEXT blueprints_status\n        TEXT specs_status\n        TEXT tests_status\n        TEXT overall_status\n        TEXT summary\n    }\n    blueprint_proposals {\n        TEXT plan_id PK\n        TEXT blueprint_name\n        TEXT source_type\n        TEXT destination_type\n        TEXT tables\n        TEXT assets\n        REAL confidence\n        TEXT assumptions\n        TEXT unsupported\n        TEXT decisions\n        TEXT provider\n        INTEGER can_auto_apply\n        INTEGER applied\n        TEXT proposed_at\n        TEXT applied_at\n    }\n    installed_blueprints {\n        TEXT name PK\n        TEXT version\n        TEXT source\n        TEXT destination\n        INTEGER verified\n        TEXT installed_at\n        TEXT registry_url\n    }\n\n    pipeline_runs ||--o{ contract_results : \"run_id\"\n    pipeline_runs ||--o{ diagnostic_results : \"run_id\"\n"
  },
  {
    "id": "08_error_taxonomy",
    "title": "08-error-taxonomy",
    "code": "%% PipelineKit \u2014 Error Code Taxonomy (Maintenance / On-Call)\n%% Audience: on-call engineers, support.\n%% Classes verified against src/pipelinekit/core/errors.py.\n%% Code RANGES verified against docs/reference/Error-Codes.md.\n%% PK-ADAPTER-* and PK-NOTIFY-* have no dedicated subclass yet \u2014 carried by base.\nflowchart TB\n    base[\"PipelineKitError<br/>(code, message, context)\"]\n\n    base --> cfg[\"ConfigurationError \u2014 PK-CONFIG-001..006<br/>cmd: init, validate<br/>fix: correct pipelinekit.yaml / set ${VAR}\"]\n    base --> state[\"StateError \u2014 PK-STATE-001..003<br/>cmd: any (state.db)<br/>fix: check .pipelinekit/ permissions\"]\n    base --> rt[\"RuntimeError \u2014 PK-RUNTIME-001..003<br/>cmd: run<br/>fix: read the failing step detail\"]\n    base --> contract[\"ContractError \u2014 PK-CONTRACT-001..008<br/>cmd: validate --contracts, run<br/>fix: fix source data or contract\"]\n    base --> bp[\"BlueprintError \u2014 PK-BLUEPRINT-001..004<br/>cmd: blueprint validate/info<br/>fix: fix manifest / directory\"]\n    base --> diagc[\"DiagnosticsError \u2014 PK-DIAG-001..003<br/>cmd: diagnose<br/>fix: check run id / evidence in state\"]\n    base --> llm[\"LLMError \u2014 PK-AI-001..003<br/>cmd: diagnose, architect, generate, migrate<br/>fix: set provider API key / retry\"]\n    base --> arch[\"ArchitectureError \u2014 PK-ARCH-001..004<br/>cmd: architect<br/>fix: run more pipelines (history)\"]\n    base --> health[\"HealthError \u2014 PK-HEALTH-001..004<br/>cmd: health<br/>fix: install poetry / pip-audit\"]\n    base --> prop[\"ProposalError \u2014 PK-GEN-001..007<br/>cmd: generate, apply<br/>fix: follow the review flow\"]\n    base --> reg[\"RegistryError \u2014 PK-REGISTRY-001..005<br/>cmd: blueprint search/install<br/>fix: connectivity / --force\"]\n    base --> mig[\"MigrationError \u2014 PK-MIGRATE-001..005<br/>cmd: migrate analyze<br/>fix: check path/format / --write-draft\"]\n\n    subgraph NOCLASS[\"Code families carried by base PipelineKitError (no dedicated subclass)\"]\n        direction LR\n        adapter[\"PK-ADAPTER-001..003<br/>cmd: run<br/>fix: check source/dest reachability & creds\"]\n        notify[\"PK-NOTIFY-001..004<br/>cmd: run (notifications)<br/>fix: set RESEND_API_KEY / fix recipient\"]\n    end\n    base -.-> NOCLASS\n\n    classDef errnode fill:#3a1f1f,color:#fdd,stroke:#c66;\n    class cfg,state,rt,contract,bp,diagc,llm,arch,health,prop,reg,mig,adapter,notify errnode;\n"
  },
  {
    "id": "09_blueprint_catalog_registry",
    "title": "09-blueprint-catalog-registry",
    "code": "%% PipelineKit \u2014 Blueprint Catalog and Registry (Product / Engineering)\n%% Audience: product, engineers, design partners.\n%% Catalog and verification states verified against PROJECT-STATUS.md, blueprints/, remote.py.\nflowchart TB\n    subgraph SRC[\"Blueprint Sources\"]\n        direction TB\n        subgraph HAND[\"Hand-crafted (local)\"]\n            pg[\"postgres-to-snowflake v1.0.0<br/>locally verified \u2014 1,000 rows\"]\n            sf[\"salesforce-to-snowflake v1.0.0<br/>locally verified \u2014 800 rows\"]\n        end\n        subgraph AIP[\"AI-Proposed (BlueprintProposer)\"]\n            st[\"stripe-to-snowflake v1.0.0<br/>AI-proposed, human-approved<br/>local verification pending\"]\n        end\n        subgraph REG[\"Registry (registry.pipelinekit.dev \u2014 deploy pending)\"]\n            rsearch[\"pipelinekit blueprint search &lt;query&gt;\"]\n            rinstall[\"pipelinekit blueprint install &lt;name&gt;\"]\n            note[\"currently returns PK-REGISTRY-001<br/>(not yet deployed)\"]\n        end\n    end\n\n    subgraph ASSETS[\"Blueprint structure \u2014 8 required assets (lenient layout)\"]\n        direction TB\n        a1[\"blueprint.json\"]\n        a2[\"ingestion/ (dlt)\"]\n        a3[\"transform/ or dbt/ (dbt project)\"]\n        a4[\"contracts/*.yaml\"]\n        a5[\"quality/ or dbt/tests (Soda)\"]\n        a6[\"alerts/config.yaml\"]\n        a7[\"docs/README.md\"]\n        a8[\"docs/runbook.md or RUNBOOK.md\"]\n    end\n\n    subgraph VERIFY[\"Verification lifecycle\"]\n        direction LR\n        v0[\"proposed\"] --> v1[\"approved\"] --> v2[\"written\"] --> v3[\"validated\"] --> v4[\"locally verified\"] --> v5[\"production verified\"]\n    end\n\n    HAND --> ASSETS\n    AIP --> ASSETS\n    REG --> ASSETS\n    ASSETS --> VERIFY\n\n    classDef pending fill:#3a341a,color:#fe9,stroke:#cb6;\n    class note,st pending;\n"
  },
  {

const container = document.getElementById('container');
for (const d of diagrams) {
