    "code": "# CLI Command Map\n\nEvery command, its arguments/flags, the `state.db` tables it reads and writes, and the external system it calls. Verified against `src/pipelinekit/cli/`.\n\n| Command | Arguments / flags | Reads (state) | Writes (state) | External |\n|---|---|---|---|---|\n| `init` | \u2014 | \u2014 | \u2014 | writes `pipelinekit.yaml`, `.gitignore` |\n| `validate` | `[--contracts]` | `pipelinekit.yaml`, `contracts/` | \u2014 | \u2014 |\n| `run` | `[--dry-run]` | `pipelinekit.yaml` | `pipeline_runs` (pending \u2192 final) | dlt / dbt / Soda |\n| `status` | \u2014 | `pipeline_runs` | \u2014 | \u2014 |\n| `blueprint list` | \u2014 | `blueprints/` | \u2014 | \u2014 |\n| `blueprint validate` | `[name]` | `blueprints/`, schema | \u2014 | \u2014 |\n| `blueprint info` | `<name>` | `blueprints/` | \u2014 | \u2014 |\n| `blueprint search` | `<query> [--verified]` | \u2014 | \u2014 | remote registry |\n| `blueprint install` | `<name> [--version] [--force]` | \u2014 | `installed_blueprints` | remote registry |\n| `generate blueprint` | `-s -d -t [--plan\\|--interactive] [-p] [-n]` | `blueprints/`, schema | `blueprint_proposals` | AI provider |\n| `generate show` | `<plan-id>` | `blueprint_proposals` | \u2014 | \u2014 |\n| `apply plan` | `<plan-id> [--interactive]` | `blueprint_proposals` | `blueprint_proposals`; `blueprints/` files | \u2014 |\n| `diagnose` | `[run-id] [--provider] [--approve]` | `pipeline_runs` / evidence | `diagnostic_results` | AI provider |\n| `architect analyze` | `[question] [--type] [--provider] [--approve]` | project state | `architecture_results` | AI provider |\n| `architect check-adrs` | `<change> [--provider]` | ADRs | `architecture_results` | AI provider |\n| `architect compare` | `<tool-a> <tool-b> [--provider]` | project state | `architecture_results` | AI provider |\n| `health` | `[--strict]` | project / tooling | `health_runs` | poetry / pip-audit |\n| `health deps` | \u2014 | dependencies | \u2014 | poetry |\n| `health security     "title": "04-pipeline-execution-flow",
    "kind": "mermaid",
    "code": "%% PipelineKit \u2014 Pipeline Execution Flow (Engineering / Debugging)\n%% Audience: engineers debugging pipelinekit run.\n%% Sequence verified against src/pipelinekit/runtime/runner.py (run()).\n%% The run record is updated in a try/finally \u2014 it is NEVER skipped, even on failure.\nsequenceDiagram\n    actor User\n    participant CLI as CLI (run.py)\n    participant Loader as config.loader\n    participant Runner as PipelineRunner\n    participant State as state.db\n    participant Adapters as Adapters (dlt / dbt / Soda)\n    participant Notifier as NotificationDispatcher\n\n    User->>CLI: pipelinekit run\n    CLI->>Loader: load_config()\n    alt config invalid\n        Loader-->>CLI: ConfigurationError (PK-CONFIG-001..004)\n        CLI-->>User: print error, exit 1\n    end\n    Loader-->>CLI: PipelineConfig\n    CLI->>Runner: run()\n    Runner->>State: insert_run(run_id, status=pending)\n\n    Note over Runner,Adapters: Enabled steps only, in order: ingestion, transformation, quality\n\n    loop each enabled adapter\n        Runner->>Adapters: execute_step(name, adapter)\n        alt step succeeds\n            Adapters-->>Runner: StepResult(SUCCESS, rows, duration)\n        else step fails\n            Adapters-->>Runner: StepResult(FAILED, error_code e.g. PK-ADAPTER-001/002)\n        end\n    end\n\n    Note over Runner: aggregate status (SUCCESS / PARTIAL / FAILED).<br/>Unexpected exception, error_code = PK-RUNTIME-001\n\n    Runner->>State: update_run(final status, duration, error_code) [try/finally]\n\n    opt notifications.enabled\n        Runner->>Notifier: notify_pipeline_result(result)\n        Note over Notifier: failure swallowed \u2014 never corrupts state (SPEC-008)\n    end\n\n    Runner-->>CLI: PipelineResult (per-step status, duration, rows)\n    CLI-->>User: render run table, exit 0 if succeeded else 1\n\n    Note over CLI,State: Data contract DEFINITIONS are checked by<br/>pipelinekit validate --contracts (PK-CONTRACT-*);<br/>data-quality checks run in the Soda step above.\n"

only<br/>_strip_provenance() before write\"]\n    write --> validatecmd[\"pipelinekit blueprint validate\"]\n\n    %% State machine\n    subgraph SM[\"AssetState machine (invalid transition = PK-GEN-007)\"]\n        direction LR\n        s0[\"proposed\"] --> s1[\"approved\"] --> s2[\"written\"] --> s3[\"validated\"]\n        s0 --> sr[\"rejected\"]\n        s0 --> se[\"edited\"] --> s0\n    end\n\n    loop -.-> s1\n    write -.-> s2\n    validatecmd -.-> s3\n\n    classDef err fill:#7d1a1a,color:#fff,stroke:#c66;\n    class gen1,gen2,gen3,gen4,gen6 err;\n"

    "code": "%% PipelineKit \u2014 Migration Intelligence Flow (Engineering / Sales)\n%% Audience: engineers evaluating migration; sales with Airbyte/Fivetran users.\n%% Verified against ai/config_parsers.py, ai/migration_analyzer.py, cli/migrate.py.\n%% Parsing is deterministic; the Python parser uses ast.parse() only \u2014 never exec.\nflowchart TB\n    cfg[\"Existing config<br/>airbyte-connection.json / fivetran-connector.json / pipeline.py\"]\n    cfg --> route{\"MigrationConfigParser.parse()<br/>detect format\"}\n    route -->|\".json (Airbyte)\"| ap[\"AirbyteParser\"]\n    route -->|\".json (Fivetran)\"| fp[\"FivetranParser\"]\n    route -->|\".py\"| pp[\"PythonParser (ast.parse only)\"]\n    route -->|\"not found\"| m1[\"PK-MIGRATE-001\"]\n    route -->|unrecognised| m2[\"PK-MIGRATE-002\"]\n    pp -->|\"syntax error\"| m5[\"PK-MIGRATE-005\"]\n\n    ap --> analyze[\"MigrationAnalyzer.analyze()<br/>build context + available blueprints\"]\n    fp --> analyze\n    pp --> analyze\n    analyze --> call[\"LLMProvider.analyze_migration()\"]\n    call -->|\"invalid JSON\"| m4[\"PK-MIGRATE-004\"]\n    call --> prop[\"MigrationProposal<br/>mappings + gaps + confidence + draft_yaml<br/>can_auto_apply = False\"]\n\n    prop --> render[\"CLI renders mappings and gaps\"]\n    subgraph MAP[\"Mapping status\"]\n        direction LR\n        clean[\"clean \u2014 maps directly\"]\n        partial[\"partial \u2014 maps with adjustment\"]\n        manual[\"manual \u2014 significant human work\"]\n        unsupported[\"unsupported \u2014 no equivalent\"]\n    end\n    render --> MAP\n\n    render --> applycmd[\"pipelinekit migrate analyze --apply\"]\n    applycmd --> gate{\"blocking_gaps > 0 and not --write-draft?\"}\n    gate -->|yes| m3[\"PK-MIGRATE-003<br/>use --write-draft\"]\n    gate -->|\"no / --write-draft\"| draft[\"write pipelinekit.proposed.yaml<br/>(NEVER pipelinekit.yaml)\"]\n    draft --> fill[\"human fills FIXME markers\"]\n    fill --> val[\"pipelinekit validate\"     "id": "07_state_store_schema",
    "title": "07-state-store-schema",
    "kind": "mermaid",
    "code": "%% PipelineKit \u2014 State Store Schema (Maintenance / Engineering)\n%% Audience: maintainers, engineers debugging state.\n%% Columns verified EXACTLY against src/pipelinekit/state/db.py (_SCHEMA).\n%% State lives at .pipelinekit/state.db (SQLite). Run-id links are logical\n%% (no enforced FK constraints in the schema). Command->table edges: see Diagram 03.\nerDiagram\n    pipeline_runs {\n        TEXT id PK\n        TEXT pipeline\n        TEXT status\n        TEXT started_at\n        TEXT finished_at\n        REAL duration_s\n        TEXT error_code\n        TEXT error_msg\n    }\n    validation_runs {\n        TEXT id PK\n        TEXT status\n        TEXT ran_at\n        INTEGER error_count\n        TEXT errors\n    }\n    contract_results {\n        TEXT id PK\n        TEXT run_id FK\n        TEXT table_name\n        TEXT status\n        INTEGER violation_count\n        TEXT violations\n        TEXT checked_at\n    }\n    diagnostic_results {\n        TEXT id PK\n        TEXT run_id FK\n        TEXT status\n        TEXT finding_type\n        REAL confidence\n        TEXT explanation\n        TEXT evidence\n        TEXT actions\n        INTEGER can_auto_fix\n        TEXT diagnosed_at\n        TEXT provider\n    }\n    architecture_results {\n        TEXT id PK\n        TEXT reasoning_type\n        TEXT question\n        REAL confidence\n        TEXT recommendation\n        TEXT tradeoffs\n        TEXT adr_compliance\n        INTEGER can_auto_apply\n        TEXT analyzed_at\n        TEXT provider\n    }\n    health_runs {\n        TEXT id PK\n        TEXT ran_at\n        TEXT deps_status\n        TEXT security_status\n        TEXT blueprints_status\n        TEXT specs_status\n        TEXT tests_status\n        TEXT overall_status\n        TEXT summary\n    }\n    blueprint_proposals {\n        TEXT plan_id PK\n        TEXT blueprint_name\n        TEXT source_type\n        TEXT destination_type\n        TEXT tables\n        TEXT assets\n        REAL confidence\n        TEXT assumptions\n        TEXT unsupported\n        TEXT decisions\n        TEXT provider\n        INTEGER can_auto_apply\n        INTEGER applied\n        TEXT proposed_at\n        TEXT applied_at\n    }\n    installed_blueprints {\n        TEXT name PK\n        TEXT version\n        TEXT source\n        TEXT destination\n        INTEGER verified\n        TEXT installed_at\n        TEXT registry_url\n    }\n\n    pipeline_runs ||--o{ contract_results : \"run_id\"\n    pipeline_runs ||--o{ diagnostic_results : \"run_id\"\n"

  {
    "id": "08_error_taxonomy",
    "title": "08-error-taxonomy",
    "kind": "markdown",
    "code": "# Error Code Taxonomy\n\nEvery error carries a stable `PK-[AREA]-[NUMBER]` code. Classes verified against `src/pipelinekit/core/errors.py`; code ranges verified against `docs/reference/Error-Codes.md`. All classes derive from the base `PipelineKitError(code, message, context)`.\n\n| Error class | Codes | Triggered by | What to do |\n|---|---|---|---|\n| `ConfigurationError` | `PK-CONFIG-001..006` | `init`, `validate` | Correct `pipelinekit.yaml` / set the `${VAR}` |\n| `StateError` | `PK-STATE-001..003` | any (state.db) | Check `.pipelinekit/` permissions |\n| `RuntimeError` | `PK-RUNTIME-001..003` | `run` | Read the failing step's detail |\n| _(no dedicated class)_ | `PK-ADAPTER-001..003` | `run` | Check source/destination reachability & credentials |\n| `ContractError` | `PK-CONTRACT-001..008` | `validate --contracts`, `run` | Fix source data or the contract |\n| `BlueprintError` | `PK-BLUEPRINT-001..004` | `blueprint validate/info` | Fix the manifest / directory |\n| _(no dedicated class)_ | `PK-NOTIFY-001..004` | `run` (notifications) | Set `RESEND_API_KEY` / fix recipient |\n| `LLMError` | `PK-AI-001..003` | `diagnose`, `architect`, `generate`, `migrate` | Set the provider API key / retry |\n| `DiagnosticsError` | `PK-DIAG-001..003` | `diagnose` | Check run id / evidence in state |\n| `ArchitectureError` | `PK-ARCH-001..004` | `architect` | Run more pipelines (need history) |\n| `HealthError` | `PK-HEALTH-001..004` | `health` | Install poetry / pip-audit |\n| `ProposalError` | `PK-GEN-001..007` | `generate`, `apply` | Follow the review flow |\n| `RegistryError` | `PK-REGISTRY-001..005` | `blueprint search/install` | Check connectivity / use `--force` |\n| `MigrationError` | `PK-MIGRATE-001..005` | `migrate analyze` | Check path/format / use `--write-draft` |\n\n`PK-ADAPTER-*` and `PK-NOTIFY-*` have no dedicated exception subclass yet \u2014 they are carried by the base `PipelineKitError`. The CLI renders the code and message; it never surfaces a raw stack trace.\n"
  },
  {
    "id": "09_blueprint_catalog",
    "title": "09-blueprint-catalog",
    "kind": "markdown",
    "code": "# Blueprint Catalog and Registry\n\nThe blueprint ecosystem \u2014 local, AI-proposed, and registry. Verified against `PROJECT-STATUS.md`, `blueprints/`, `src/pipelinekit/blueprints/remote.py`, and `registry/v1/catalog.json`.\n\n## Catalog\n\n| Blueprint | Source \u2192 Destination | Origin | Verification | Registry `verified` |\n|---|---|---|---|---|\n| `postgres-to-snowflake` v1.0.0 | postgres \u2192 snowflake | Hand-crafted | Locally verified \u2014 1,000 rows | `true` |\n| `salesforce-to-snowflake` v1.0.0 | salesforce \u2192 snowflake | Hand-crafted | Locally verified \u2014 800 rows | `true` |\n| `stripe-to-snowflake` v1.0.0 | stripe \u2192 snowflake | AI-proposed, human-approved | Local verification pending | `false` |\n\nThe registry (`registry.pipelinekit.dev`) serves `v1/catalog.json` once deployed to Cloudflare Pages. Until then, `pipelinekit blueprint search` / `install` return `PK-REGISTRY-001`; the three blueprints already exist in the repo under `blueprints/`.\n\n## The 8 Required Assets\n\nEach blueprint must provide these eight assets. The registry verifies all eight are present before writing a blueprint to disk (layout is lenient \u2014 each row passes if any candidate path exists).\n\n| # | Asset | Path (candidates) | Purpose |\n|---|---|---|---|\n| 1 | Manifest | `blueprint.json` | Identity, source/destination, contracts, KPIs, targets |\n| 2 | Ingestion | `ingestion/` | dlt ingestion pipeline |\n| 3 | Transform | `transform/` or `dbt/` | dbt project (staging \u2192 core) |\n| 4 | Contracts | `contracts/` | Data contract definitions |\n| 5 | Quality | `quality/` or `dbt/tests` | Soda quality checks |\n| 6 | Alerts | `alerts/` | Notification / alert configuration |\n| 7 | Readme | `docs/README.md` or `README.md` | What the blueprint does |\n| 8 | Runbook | `docs/runbook.md` / `RUNBOOK.md` | Verification recipe and operations |\n\n## Verification Lifecycle\n\n| Stage | Meaning |\n|---|---|\n| `proposed` | AI proposed the asset (or hand-authored draft) |\n| `approved` | A human approved it |\n| `written` | `apply()` wrote it to `blueprints/<name>/` |\n| `validated` | Passed `blueprint validate` (schema + assets) |\n| `locally verified` | Ran end-to-end against a local source + DuckDB, recorded in the runbook |\n| `production verified` | Ran against the real warehouse \u2014 the bar for registry `verified: true` |\n"
  },

const container = document.getElementById('container');
for (const d of diagrams) {
  const section = document.createElement('section');
  const h = document.createElement('h2');
  h.className = 'diagram-title';
  h.textContent = d.title;
  section.appendChild(h);
  const target = document.createElement('div');
  section.appendChild(target);
  container.appendChild(section);
  if (d.kind === 'markdown') {
    target.className = 'md';
    target.innerHTML = marked.parse(d.code);
  } else {
    target.className = 'mmd';
    try {
      const { svg } = await mermaid.render('mmd_' + d.id, d.code);
      target.innerHTML = svg;
    } catch (e) {
      const pre = document.createElement('pre');
      pre.className = 'err';
      pre.textContent = 'Render error: ' + (e && e.message ? e.message : String(e));
      target.appendChild(pre);
    }
  }
